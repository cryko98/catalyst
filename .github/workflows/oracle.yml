name: CATA Oracle — autonomous feed

# Emits one new CATA transmission every 15 minutes and commits it to
# data/feed.json. The website reads that file directly (see CONFIG.feedUrl in
# script.js), so no redeploy is required for new posts to appear.
#
# Requires a repository secret named OPENAI_API_KEY.
#   Settings -> Secrets and variables -> Actions -> New repository secret

on:
  # PRIMARY trigger: an external cron service (cron-job.org, free) calls the
  # workflow_dispatch REST API every 15 minutes. GitHub's own scheduler is too
  # unreliable for a tight interval, so we drive it from outside. See README
  # section "Reliable 15-minute posting". The schedule below is only a
  # best-effort fallback and will fire irregularly, if at all.
  schedule:
    # Offset from the top of the hour to dodge GitHub's peak-load throttling.
    - cron: '3,18,33,48 * * * *'
  workflow_dispatch: {} # manual runs + the external cron trigger use this

# Prevent overlapping runs from racing on the same file.
concurrency:
  group: cata-oracle
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  transmit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate transmission
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: node scripts/generate-post.mjs

      - name: Commit updated feed
        run: |
          git config user.name "cata-oracle[bot]"
          git config user.email "cata-oracle@users.noreply.github.com"
          if git diff --quiet -- data/feed.json; then
            echo "No changes to commit."
            exit 0
          fi
          git add data/feed.json
          git commit -m "oracle: new transmission [skip ci]"
          git push
