name: CATA Oracle — autonomous feed

# Emits one new CATA transmission every 15 minutes and commits it to
# data/feed.json. The website reads that file directly (see CONFIG.feedUrl in
# script.js), so no redeploy is required for new posts to appear.
#
# Requires a repository secret named OPENAI_API_KEY.
#   Settings -> Secrets and variables -> Actions -> New repository secret

on:
  # We ATTEMPT a run every 5 minutes. GitHub's scheduler is unreliable for
  # short intervals (it delays/drops runs), so attempting often gives us far
  # more chances to land a run inside any ~30-min window. The generator script
  # enforces a ~13-min cooldown, so frequent attempts never spam the feed —
  # net effect: roughly one transmission every ~15 min, gaps rarely over 30.
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: {} # manual runs (bypass the cooldown, see FORCE_POST)

# Prevent overlapping runs from racing on the same file.
concurrency:
  group: cata-oracle
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  transmit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate transmission
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          # Manual "Run workflow" clicks post immediately; scheduled attempts
          # respect the ~13-min cooldown in the script.
          FORCE_POST: ${{ github.event_name == 'workflow_dispatch' }}
        run: node scripts/generate-post.mjs

      - name: Commit updated feed
        run: |
          git config user.name "cata-oracle[bot]"
          git config user.email "cata-oracle@users.noreply.github.com"
          if git diff --quiet -- data/feed.json; then
            echo "No changes to commit."
            exit 0
          fi
          git add data/feed.json
          git commit -m "oracle: new transmission [skip ci]"
          git push
